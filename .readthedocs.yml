# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the version of Python and other tools you might need
build:
   os: ubuntu-22.04
   tools:
      python: "3.10"

# Build documentation in the docs/ directory with Sphinx
sphinx:
   configuration: docs/conf.py

# Optionally set the version of Python and requirements required to build your docs
python:
   install:
    # Core install only — deliberately NO heavy extras ([bo]/[cmip]/[mpi]/
    # [comp] in setup.py): tensorflow/trieste, intake/xesmf, mpi4py etc. are
    # not needed to build the docs and should be mocked via
    # autodoc_mock_imports in docs/conf.py instead.
    - method: pip
      path: .
    - requirements: docs/requirements.txt

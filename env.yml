name: potential-height-env
channels:
  - conda-forge # Use conda-forge as the primary, it's the most comprehensive

dependencies:
  # === Core Runtime Dependencies ===
  - python=3.10
  # tensorflow (<2.17, pulled in via trieste) requires numpy<2; pin it here so
  # the conda solve (numba/xesmf/cartopy) stays consistent with the pip TF stack.
  # (Mirrored in setup.py install_requires as "numpy<2".)
  - numpy<2
  - xesmf     # Includes xarray, netcdf4, h5netcdf, etc. as dependencies
  - cartopy
  - metpy
  - octave
  - numba
  - llvmlite

  # === Testing & Linting Tools ===
  - pytest
  - pytest-cov
  - black
  - isort
  - mypy

  # === Notebook & Utility Tools ===
  - ipython
  - jupyterlab
  - ipywidgets
  - ipykernel
  - python-dotenv

  # === Pip for your local package ===
  - pip
  - pip:
    # Pin a modern, internally consistent TensorFlow stack on Linux (CI).
    # Without a pin the resolver lands on an EOL tensorflow (<2.12) whose _pb2
    # files were built with protoc <3.19, which crashes on modern protobuf
    # ("Descriptors cannot be created directly"). TF 2.15 ships protobuf 4.x
    # protos and bundles Keras 2 (no tf-keras needed); TFP 0.23 is the matching
    # release. macOS keeps trieste's own tensorflow-macos resolution.
    # (These two pins are mirrored in setup.py's "bo" extra.)
    - tensorflow==2.15.1 ; sys_platform == "linux"
    - tensorflow-probability==0.23.0 ; sys_platform == "linux"
    # setup.py splits the heavy stacks into extras (bo/cmip/mpi/comp);
    # install [all] here so CI and the dev env keep the full research stack
    # (matching the pre-split behaviour).
    - -e .[all] # Installs the package with all extras from setup.py